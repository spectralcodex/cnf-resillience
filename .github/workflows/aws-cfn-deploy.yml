name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Choose deployment environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  BUCKET_NAME: cfn-templates-github-actions

jobs:
  # Local checks
  lock_file:
    name: lock packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/setup
      - run: uv lock --locked

  linting:
    runs-on: ubuntu-latest
    needs: [lock_file]
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/setup
     # - name: lint_cfn
     #   run: uvx cfn-lint cloudformation/environments/*.yaml cloudformation/environments/dev/*.yaml

      - name: lint_app
        run: uvx ruff check .

  formatting:
    name: format sources
    runs-on: ubuntu-latest
    needs:
      - lock_file
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/setup
      - run: uvx ruff format --check .

  # deploy to AWS
